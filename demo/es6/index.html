<!doctype html>
<html>
  <head>
    <title>svgMap ES6 demos</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="stylesheet" href="./demo.css" />
    <link rel="stylesheet" href="./node_modules/svgmap/dist/svg-map.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:400,500"
      rel="stylesheet"
    />

    <!-- Snowpack 1.x only installs deps to web_modules/; the browser needs an import map for bare specifiers like "svgmap". -->
    <script type="importmap">
      {
        "imports": {
          "svgmap": "./web_modules/svgmap.js"
        }
      }
    </script>
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <div class="demo-wrapper">
      <!-- Demo GPD -->

      <div class="demo-container">
        <h2>GDP per capita</h2>
        <div id="svgMapGPD"></div>
      </div>

      <!-- Demo population -->

      <div class="demo-container">
        <h2>Population desity<br><span>(emojis as flags)</span></h2>
        <div id="svgMapPopulation"></div>
      </div>

      <!-- Demo person height in German -->

      <div class="demo-container">
        <h2>Average person height<br><span>(no flags, German language)</span></h2>
        <div id="svgMapPersonHeight"></div>
      </div>

      <!-- Demo custom tooltips -->

      <div class="demo-container">
        <h2>Countries using Euro as currency<br><span>(custom tooltips)</span></h2>
        <div id="svgMapEuroCurrency"></div>
      </div>
    </div>
  </body>
</html>
